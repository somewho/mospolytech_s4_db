<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FilmDB</title>
  <link rel="stylesheet" href="/static/css/main.css" />
</head>
<body>

  <!-- Navbar -->
  <nav id="navbar">
    <div class="container nav-inner">
      <a class="nav-logo" href="#/" onclick="return false;">🎬 FilmDB</a>
      <div class="nav-links">
        <div class="nav-link" data-page="films">Фильмы</div>
        <div class="nav-link" data-page="persons">Персоны</div>
        <div class="nav-link" data-page="festivals">Фестивали</div>
      </div>
      <div class="nav-right" id="nav-auth">
        <!-- injected by JS -->
      </div>
    </div>
  </nav>

  <!-- Page content -->
  <div id="page-root"></div>

  <!-- Auth modal -->
  <div id="auth-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <button class="modal-close" id="auth-modal-close">×</button>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Войти</button>
        <button class="auth-tab" data-tab="register">Регистрация</button>
      </div>

      <!-- Login form -->
      <div id="auth-login">
        <div class="form-field">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="email@example.com" autocomplete="email" />
        </div>
        <div class="form-field">
          <label>Пароль</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div class="form-error hidden" id="login-error"></div>
        <button class="btn btn-gold form-submit" id="login-submit">Войти</button>
        <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-muted)">
          Нет аккаунта?
          <span style="color:var(--blue);cursor:pointer" id="switch-to-register">Зарегистрироваться</span>
        </div>
      </div>

      <!-- Register form -->
      <div id="auth-register" class="hidden">
        <div style="display:flex;gap:12px">
          <div class="form-field" style="flex:1">
            <label>Имя</label>
            <input type="text" id="reg-firstname" placeholder="Имя" />
          </div>
          <div class="form-field" style="flex:1">
            <label>Фамилия</label>
            <input type="text" id="reg-lastname" placeholder="Фамилия" />
          </div>
        </div>
        <div class="form-field">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="email@example.com" autocomplete="email" />
        </div>
        <div class="form-field">
          <label>Пароль</label>
          <input type="password" id="reg-password" placeholder="Минимум 6 символов" autocomplete="new-password" />
        </div>
        <div class="form-error hidden" id="reg-error"></div>
        <button class="btn btn-gold form-submit" id="reg-submit">Создать аккаунт</button>
        <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--text-muted)">
          Уже есть аккаунт?
          <span style="color:var(--blue);cursor:pointer" id="switch-to-login">Войти</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Toasts -->
  <div id="toast-root"></div>

  <script src="/static/js/main.js"></script>
</body>
</html>
