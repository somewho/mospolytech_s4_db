version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: filmdb_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-filmdb}
      POSTGRES_USER: ${POSTGRES_USER:-filmdb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-filmdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-filmdb} -d ${POSTGRES_DB:-filmdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    container_name: filmdb_app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-filmdb}:${POSTGRES_PASSWORD:-filmdb}@db:5432/${POSTGRES_DB:-filmdb}
      SECRET_KEY: ${SECRET_KEY:-changeme-in-production}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./app:/app/app:ro

  seed:
    build: .
    container_name: filmdb_seed
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-filmdb}:${POSTGRES_PASSWORD:-filmdb}@db:5432/${POSTGRES_DB:-filmdb}
    command: python seed/seed.py
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./seed:/app/seed:ro
    profiles:
      - seed

volumes:
  postgres_data:
